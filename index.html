<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneur Inner Circle</title>

<style>
:root{
--rose:#C8788A;
--cream:#F5EFE8;
--gold:#C6A965;
--ink:#2F2F2F;
}

body{
margin:0;
font-family: Arial, sans-serif;
background:var(--cream);
color:var(--ink);
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
background:var(--rose);
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.hidden{
display:none;
}

.nav{
display:flex;
gap:10px;
margin-top:20px;
}

.nav button{
flex:1;
background:var(--gold);
}
</style>
</head>

<body>

<div class="container">

<!-- Setup Screen -->

<div id="setupScreen" class="card">
<h1>Entrepreneur Inner Circle</h1>

<p>Enter your name and starting month.</p>

<input id="nameInput" placeholder="Your Name" style="width:100%;padding:10px;margin-bottom:10px">

<select id="monthInput" style="width:100%;padding:10px;margin-bottom:10px">
<option value="1">Month 1</option>
<option value="2">Month 2</option>
<option value="3">Month 3</option>
<option value="4">Month 4</option>
<option value="5">Month 5</option>
<option value="6">Month 6</option>
<option value="7">Month 7</option>
<option value="8">Month 8</option>
<option value="9">Month 9</option>
<option value="10">Month 10</option>
<option value="11">Month 11</option>
<option value="12">Month 12</option>
</select>

<button onclick="startApp()">Open My App</button>
</div>

<!-- App -->

<div id="appScreen" class="hidden">

<div class="card">
<h2 id="welcome"></h2>
<p id="monthLabel"></p>
</div>

<div class="nav">
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('notes')">Notes</button>
<button onclick="showSection('goals')">Goals</button>
</div>

<div id="dashboard" class="card">
<h3>Dashboard</h3>
<p>Welcome to your Inner Circle workspace.</p>
</div>

<div id="notes" class="card hidden">
<h3>Notes</h3>
<textarea id="notesBox" style="width:100%;height:120px"></textarea>
<br><br>
<button onclick="saveNotes()">Save Notes</button>
</div>

<div id="goals" class="card hidden">
<h3>Goals</h3>
<textarea id="goalsBox" style="width:100%;height:120px"></textarea>
<br><br>
<button onclick="saveGoals()">Save Goals</button>
</div>

</div>

</div>

<script>

function startApp(){

var name=document.getElementById("nameInput").value;
var month=document.getElementById("monthInput").value;

if(name===""){
alert("Please enter your name");
return;
}

localStorage.setItem("eic_name",name);
localStorage.setItem("eic_month",month);

loadApp();
}

function loadApp(){

var name=localStorage.getItem("eic_name");
var month=localStorage.getItem("eic_month");

if(name){

document.getElementById("setupScreen").classList.add("hidden");
document.getElementById("appScreen").classList.remove("hidden");

document.getElementById("welcome").innerText="Welcome "+name;
document.getElementById("monthLabel").innerText="Current Month: "+month;

var notes=localStorage.getItem("eic_notes");
if(notes) document.getElementById("notesBox").value=notes;

var goals=localStorage.getItem("eic_goals");
if(goals) document.getElementById("goalsBox").value=goals;

}

}

function showSection(section){

document.getElementById("dashboard").classList.add("hidden");
document.getElementById("notes").classList.add("hidden");
document.getElementById("goals").classList.add("hidden");

document.getElementById(section).classList.remove("hidden");

}

function saveNotes(){
localStorage.setItem("eic_notes",document.getElementById("notesBox").value);
alert("Notes saved");
}

function saveGoals(){
localStorage.setItem("eic_goals",document.getElementById("goalsBox").value);
alert("Goals saved");
}

loadApp();

</script>

</body>
</html>
